<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Cálculo Integral</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
<h1>SIMULADOR DE CÁLCULO DE UNA VARIABLE</h1>
<h2>Unidad 3 - Ingeniería Industrial</h2>
</header>

<div class="contenedor">

<!-- BIENVENIDA -->
<div id="bienvenida" class="pantalla">
    <h2>Bienvenido</h2>
    <p>Simulador de Cálculo Integral - Unidad 3</p>
    <button onclick="mostrarMenu()">Comenzar</button>
</div>

<!-- MENÚ -->
<div id="menu" class="pantalla oculto">
    <h2>Selecciona un modo</h2>

    <div class="botones">
        <button onclick="abrirSeccion('estudiar')">📘 Estudiar</button>
        <button onclick="abrirSeccion('examen')">📝 Examen</button>
        <button onclick="abrirSeccion('practica')">🎯 Práctica</button>
        <button onclick="abrirSeccion('repaso')">🧠 Repaso</button>
        <button onclick="abrirSeccion('formulas')">📚 Fórmulas</button>
    </div>
</div>

<!-- MODOS -->
<div id="estudiar" class="pantalla oculto"></div>
<div id="examen" class="pantalla oculto"></div>
<div id="practica" class="pantalla oculto"></div>
<div id="repaso" class="pantalla oculto"></div>
<div id="formulas" class="pantalla oculto"></div>

</div>

<script src="script.js"></script>
</body>
</html>
